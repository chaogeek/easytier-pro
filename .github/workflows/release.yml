# 发布工作流
# 触发条件：推送 v* 格式的 tag（如 v0.0.2）
# 自动构建 macOS / Windows / Linux 安装包并创建 GitHub Release

name: 发布

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

# Windows 默认用 PowerShell，这里强制所有 step 使用 bash
defaults:
  run:
    shell: bash

jobs:
  # 阶段 1：多平台构建
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS ARM64（仅支持 Apple Silicon）
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: dmg-macos-arm64
            artifact_pattern: '*.dmg'
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: msi-windows-x86_64
            artifact_pattern: '*.msi'
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: deb-linux-x86_64
            artifact_pattern: '*.deb'

    runs-on: ${{ matrix.os }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 校验版本一致性
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FILE_VERSION=$(tr -d '[:space:]' < VERSION)
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "错误：tag 版本 ($TAG_VERSION) 与 VERSION 文件 ($FILE_VERSION) 不一致"
            exit 1
          fi
          echo "版本校验通过：$TAG_VERSION"

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Linux 需要系统依赖
      - name: 安装 Linux 系统依赖
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: 安装前端依赖
        run: pnpm install --frozen-lockfile

      - name: 构建 Tauri 应用
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'easytier-pro ${{ github.ref_name }}'
          releaseBody: '详见 CHANGELOG'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.target != '' && format('--target {0}', matrix.target) || '' }}

  # 阶段 2：更新 Homebrew Tap
  homebrew:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 检出 Homebrew Tap
        uses: actions/checkout@v4
        with:
          repository: chaogeek/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_PAT || secrets.GITHUB_TOKEN }}
          path: tap

      - name: 获取 macOS DMG SHA256
        id: dmg_info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BASE_URL="https://github.com/chaogeek/easytier-pro/releases/download/${GITHUB_REF_NAME}"

          # 等待 Release 创建完成
          sleep 60

          # 下载 ARM64 DMG
          ARM64_URL="${BASE_URL}/easytier-pro_${VERSION}_aarch64.dmg"
          if curl -fSL -o arm64.dmg "$ARM64_URL" 2>/dev/null; then
            ARM64_SHA=$(shasum -a 256 arm64.dmg | awk '{print $1}')
            echo "arm64_sha=${ARM64_SHA}" >> $GITHUB_OUTPUT
            echo "ARM64 SHA256: ${ARM64_SHA}"
          else
            echo "ARM64 DMG 下载失败，跳过"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: 更新 Cask 文件
        if: steps.dmg_info.outputs.arm64_sha != ''
        run: |
          VERSION="${{ steps.dmg_info.outputs.version }}"
          ARM64_SHA="${{ steps.dmg_info.outputs.arm64_sha }}"

          cat > tap/Casks/easytier-pro.rb << CASKDEF
          cask "easytier-pro" do
            version "VERSION_PLACEHOLDER"
            sha256 arm: "ARM64_SHA_PLACEHOLDER"

            url "https://github.com/chaogeek/easytier-pro/releases/download/vVERSION_PLACEHOLDER/easytier-pro_VERSION_PLACEHOLDER_aarch64.dmg"

            name "easytier-pro"
            desc "EasyTier 网络管家 — 组网 VPN 桌面管理工具"
            homepage "https://github.com/chaogeek/easytier-pro"

            app "easytier-pro.app"

            auto_updates true

            zap trash: [
              "~/Library/Application Support/EasyTierManager",
              "~/Library/Preferences/com.chaogeek.easytier-pro.plist",
              "~/Library/Caches/com.easytier.manager",
            ]
          end
          CASKDEF

          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" tap/Casks/easytier-pro.rb
          sed -i "s/ARM64_SHA_PLACEHOLDER/${ARM64_SHA}/g" tap/Casks/easytier-pro.rb

          cat tap/Casks/easytier-pro.rb

      - name: 提交 Homebrew Tap 更新
        if: steps.dmg_info.outputs.arm64_sha != ''
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/easytier-pro.rb
          git commit -m "easytier-pro ${{ github.ref_name }}" || echo "无需更新"
          git push || echo "推送失败（可能需要设置 HOMEBREW_TAP_PAT）"
